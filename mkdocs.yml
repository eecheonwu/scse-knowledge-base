site_name: SSOT-Centric Software Engineering (SCSE) Research Handbook
site_description: >
  The official handbook and Single Source of Truth (SSOT) for the
  SSOT-Centric Software Engineering (SCSE) Research Programme.

site_author: Emmanuel Echeonwu

repo_name: scse-research-handbook
repo_url: https://github.com/<your-username>/scse-research-handbook

edit_uri: edit/main/docs/

copyright: >
  Copyright © 2026 Emmanuel Echeonwu.
  All rights reserved.

theme:
  name: material

  language: en

  logo: assets/logo.png

  favicon: assets/favicon.ico

  features:

    # Navigation

    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer

    # Search

    - search.highlight
    - search.suggest
    - search.share

    # TOC

    - toc.follow
    - toc.integrate

    # Content

    - content.code.copy
    - content.code.annotate

    # Header

    - header.autohide

  palette:

    - scheme: default

      primary: indigo

      accent: blue

      toggle:

        icon: material/weather-night

        name: Dark mode

    - scheme: slate

      primary: indigo

      accent: blue

      toggle:

        icon: material/weather-sunny

        name: Light mode

plugins:

  - search

  - awesome-pages

markdown_extensions:

  - admonition

  - attr_list

  - md_in_html

  - tables

  - footnotes

  - toc:
      permalink: true

  - pymdownx.details

  - pymdownx.superfences

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.highlight:
      anchor_linenums: true

  - pymdownx.inlinehilite

  - pymdownx.snippets

  - pymdownx.keys

  - pymdownx.tasklist:
      custom_checkbox: true

extra:

  generator: false

extra_css:

  - stylesheets/extra.css

extra_javascript:

  - javascripts/extra.js

